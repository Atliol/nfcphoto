<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Photo Album</title>
    <!-- Bootstrap 5 CSS CDN -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
    <style>
        /* --- 1. Loading Screen Styles --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #212529; /* Dark theme loading background */
            z-index: 9999; /* အပေါ်ဆုံးမှာ ပေါ်နေအောင် */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        /* Loading ပျောက်သွားတဲ့အခါ သုံးဖို့ */
        #loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* --- 2. Custom Gallery Styles --- */
        .gallery-item {
            transition: all 0.3s ease;
        }
        
        .gallery-item img {
            height: 250px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .gallery-item img:hover {
            transform: scale(1.05);
        }

        /* --- 3. Header Smooth Motion --- */
        @keyframes smooth-slide-down {
            0% {
                transform: translateY(-30px); /* အပေါ်ကနေ 30px ပဲ ဆင်းလာမယ် (အရှိန်မပြင်းအောင်) */
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .motion-header {
            /* Loading ပျောက်ပြီးမှ ညင်သာစွာ ပေါ်လာအောင် animation တပ်ထားပါတယ် */
            opacity: 0;
            animation: smooth-slide-down 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.4s; /* Loading ပြီးပြီးချင်း ချက်ချင်းပေါ်လာအောင် delay လျှော့ထားပါတယ် */
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Loading Screen Segment -->
    <div id="loading-screen">
        <div class="spinner-border text-light mb-3" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <h5 class="text-light" style="font-family: monospace; letter-spacing: 2px;">LOADING...</h5>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" style="font-family:monospace; font-style: italic;" href="#">My baby </a>
        </div>
    </nav>

    <!-- Header Section (Motion ပိုညင်သာအောင် ပြင်ထားပါတယ်) -->
    <header class="text-center py-5 bg-white shadow-sm mb-4 motion-header">
        <div class="container">
            <h1 class="fw-bold display-6">SHN-49W</h1> 
            <h1 class="fw-bold display-1">85755</h1>
            <p class="text-muted lead"></p>
        </div>
    </header>

    <!-- Category Filter Buttons -->
    <div class="container text-center mb-4">
        <div class="btn-group shadow-sm flex-wrap" role="group">
            <button type="button" class="btn btn-outline-dark filter-btn active" data-filter="all">All</button>
            <button type="button" class="btn btn-outline-dark filter-btn" data-filter="nature">Body</button>
            <button type="button" class="btn btn-outline-dark filter-btn" data-filter="travel">Engine</button>
            <button type="button" class="btn btn-outline-dark filter-btn" data-filter="people">Wheel</button>
        </div>
    </div>

    <!-- Photo Gallery Grid -->
    <main class="container flex-grow-1">
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="gallery">
            
            <!-- Item 1 (Body) -->
            <div class="col gallery-item" data-category="nature">
                <div class="card h-100 shadow-sm">
                    <img src="./image/full.jpg" class="card-img-top img-fluid album-img" alt="Green Mountains">
                    <div class="card-body">
                          <p class="card-text text-muted">Honda MSX(2015)</p>
                    </div>
                </div>
            </div>

            <!-- Item 2 (Engine) -->
            <div class="col gallery-item" data-category="travel">
                <div class="card h-100 shadow-sm">
                    <img src="./image/font.jpg" class="card-img-top img-fluid album-img" alt="Travel Luggage">
                    <div class="card-body">
                          <p class="card-text text-muted">Honda MSX(2015)</p>
                    </div>
                </div>
            </div>

            <!-- Item 3 (Wheel) -->
            <div class="col gallery-item" data-category="people">
                <div class="card h-100 shadow-sm">
                    <img src="./image/back.jpg" class="card-img-top img-fluid album-img" alt="Friends laughing">
                    <div class="card-body">
                        <p class="card-text text-muted">Honda MSX(2015)</p>
                    </div>
                </div>
            </div>

            <!-- Item 4 (Engine) -->
            <div class="col gallery-item" data-category="travel">
                <div class="card h-100 shadow-sm">
                    <img src="./image/engine.jpg" class="card-img-top img-fluid album-img" alt="Forest path">
                    <div class="card-body">
                         <p class="card-text text-muted">Honda MSX(2015)</p>
                    </div>
                </div>
            </div>

            <!-- Item 5 (Engine) -->
            <div class="col gallery-item" data-category="travel">
                <div class="card h-100 shadow-sm">
                    <img src="./image/chain.jpg" class="card-img-top img-fluid album-img" alt="Desert Road Trip">
                    <div class="card-body">
                         <p class="card-text text-muted">Honda MSX(2015)</p>
                    </div>
                </div>
            </div>

            <!-- Item 6 (Wheel) -->
            <div class="col gallery-item" data-category="people">
                <div class="card h-100 shadow-sm">
                    <img src="./image/wheel.jpg" class="card-img-top img-fluid album-img" alt="Family dinner">
                    <div class="card-body">
                          <p class="card-text text-muted">Honda MSX(2015)</p>
                    </div>
                </div>
            </div>

        </div>
    </main>
<br><br><br>
    <!-- Footer -->
    <footer class="text-center py-4 bg-dark text-light mt-auto">
        <a class="m-0" style="color:whitesmoke ;text-decoration: none;" href="https://www.tiktok.com/@thantzawmyint2021?is_from_webapp=1&sender_device=pc"
                        target="_blank">Thant Zaw Myint 3D Printing Service</a>
    </footer>

    <!-- Lightbox Modal -->
    <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-body p-0 position-relative text-end">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3 fs-4" data-bs-dismiss="modal" aria-label="Close"></button>
                    <img src="" class="img-fluid rounded w-100 shadow" id="lightboxImg" alt="Popup Image">
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JavaScript Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Custom JavaScript -->
    <script>
        // --- 1. Loading Screen Logic ---
        window.addEventListener('load', function () {
            const loadingScreen = document.getElementById('loading-screen');
            // ဝက်ဘ်ဆိုက်ထဲက ပုံတွေ၊ ဖောင့်တွေအကုန်လုံး Load ဖြစ်ပြီးတာနဲ့ Loading Screen ကို ပျောက်ခိုင်းတာပါ
            setTimeout(() => {
                loadingScreen.classList.add('fade-out');
            }, 600); // 0.6 ሰက္ကန့်လောက် ပြသပြီးမှ ပျောက်သွားမယ် (အမြင်လှအောင်လို့ပါ)
        });

        document.addEventListener("DOMContentLoaded", function () {
            // --- 2. Lightbox Feature ---
            const lightboxModal = new bootstrap.Modal(document.getElementById('lightboxModal'));
            const lightboxImg = document.getElementById('lightboxImg');
            
            document.querySelectorAll('.album-img').forEach(img => {
                img.addEventListener('click', function () {
                    lightboxImg.src = this.src;
                    lightboxModal.show();
                });
            });

            // --- 3. Filter Feature ---
            const filterButtons = document.querySelectorAll('.filter-btn');
            const galleryItems = document.querySelectorAll('.gallery-item');

            filterButtons.forEach(button => {
                button.addEventListener('click', function () {
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');

                    const filterValue = this.getAttribute('data-filter');

                    galleryItems.forEach(item => {
                        if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                            item.classList.remove('d-none');
                        } else {
                            item.classList.add('d-none');
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
